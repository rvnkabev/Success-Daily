<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Success Diary</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body{font-family:Arial,sans-serif;padding:1em;background:#f9f9f9;font-size:240%;text-align:center;}
.page{display:none}.active{display:block}
button{margin:.4em;padding:.3em 1em;font-size:90%;cursor:pointer}
input,textarea,select{width:90%;padding:.5em;font-size:90%;margin:.6em 0}
.small{font-size:70%}.hint{font-size:60%;color:#666}
.row{display:flex;gap:.6em;justify-content:center;align-items:center;flex-wrap:wrap}
.reward-card{
  background:#fff;border:1px solid #ddd;border-radius:14px;
  padding:14px;margin:10px auto;max-width:680px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.reward-actions button{font-size:70%;padding:.3em .7em}
.primary{background:#7aa2ff;color:#fff;border:none;border-radius:10px}
.danger{background:#ff7777;color:#fff;border:none;border-radius:10px}
</style>
</head>

<body>

<div class="page active" id="page1">
  <h2>Select Main Category</h2>
  <button onclick="selectCategory('Health')">Health</button>
  <button onclick="selectCategory('MentalHealth')">Mental Health</button>
  <button onclick="selectCategory('Relationship')">Relationship</button>
  <button onclick="selectCategory('Finance')">Finance</button>
  <button onclick="selectCategory('Work')">Work</button>
  <button onclick="selectCategory('Pomodoro')">Pomodoro</button>
  <button onclick="selectCategory('TonightToDoList')">Tonight ToDoList</button>
  <button onclick="selectCategory('Reward')">Reward</button>
  <button onclick="selectCategory('Other')">Other</button>
</div>

<div class="page" id="pageReward">
  <h2>Reward</h2>

  <div class="reward-card">
    <div class="small">Add / Edit Reward</div>
    <input id="rewardName" type="text" placeholder="Reward item，例如：美女 video / coffee / game" />
    <input id="rewardStars" type="number" placeholder="Star number，例如：5 / 10 / 60" />
    <button class="primary" onclick="saveCustomReward()">Save Reward</button>
    <button onclick="clearRewardForm()">Clear</button>
  </div>

  <div id="rewardList"></div>

  <button onclick="goHome()">Cancel</button>
</div>

<script>
const STORAGE_KEY = "successDiaryRewards_v1";

let editingRewardId = null;

const defaultRewards = [
  { id:"default_1", name:"抱石美女", stars:"60", text:"享受 #抱石美女 60**", locked:true },
  { id:"default_2", name:"打機老婆（30mins)", stars:"5", text:"打機 #wife 5**", locked:true },
  { id:"default_3", name:"Beer", stars:"10", text:"飲啤酒 10**", locked:true }
];

const fmtTime = () => {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes().toString().padStart(2,"0");
  const am = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m}${am}`;
};

const fmtDate = () => {
  const now = new Date();
  return new Date(now.getTime() - now.getTimezoneOffset()*60000)
    .toISOString().split("T")[0];
};

function hidePages(){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
}

function goHome(){
  hidePages();
  document.getElementById("page1").classList.add("active");
}

function selectCategory(cat){
  if(cat === "Reward") return gotoReward();
  alert("This demo keeps your Reward update only. Paste Reward functions into your original full HTML.");
}

function buildEntry(text, forceTags=null){
  const date = fmtDate(), time = fmtTime();
  const tagPart = forceTags ? ` ${forceTags}` : "";
  return `[${date}\n${time} ｜ ${text}${tagPart}]`;
}

function sendToShortcuts(encodedText){
  const url = `shortcuts://run-shortcut?name=${encodeURIComponent("SaveToSuccessDaily")}&input=text&text=${encodedText}`;
  window.open(url);
}

function loadRewards(){
  const saved = localStorage.getItem(STORAGE_KEY);
  let custom = [];
  try { custom = saved ? JSON.parse(saved) : []; } catch(e){ custom = []; }
  return [...defaultRewards, ...custom];
}

function saveRewards(customRewards){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(customRewards));
}

function getCustomRewards(){
  const saved = localStorage.getItem(STORAGE_KEY);
  try { return saved ? JSON.parse(saved) : []; } catch(e){ return []; }
}

function gotoReward(){
  hidePages();
  renderRewards();
  document.getElementById("pageReward").classList.add("active");
}

function renderRewards(){
  const list = document.getElementById("rewardList");
  list.innerHTML = "";

  loadRewards().forEach(r => {
    const div = document.createElement("div");
    div.className = "reward-card";

    div.innerHTML = `
      <div><strong>${escapeHTML(r.name)}</strong></div>
      <div class="small">${escapeHTML(r.stars)} **</div>
      <div class="reward-actions">
        <button class="primary" onclick="logReward('${r.id}')">Log</button>
        ${r.locked ? "" : `
          <button onclick="editReward('${r.id}')">Edit</button>
          <button class="danger" onclick="deleteReward('${r.id}')">Delete</button>
        `}
      </div>
    `;
    list.appendChild(div);
  });
}

function saveCustomReward(){
  const name = document.getElementById("rewardName").value.trim();
  const stars = document.getElementById("rewardStars").value.trim();

  if(!name){ alert("Please enter reward item"); return; }
  if(!stars || isNaN(Number(stars))){ alert("Please enter star number"); return; }

  let custom = getCustomRewards();

  if(editingRewardId){
    custom = custom.map(r => r.id === editingRewardId
      ? { ...r, name, stars, text:`${name} ${stars}**` }
      : r
    );
  } else {
    custom.push({
      id:"custom_" + Date.now(),
      name,
      stars,
      text:`${name} ${stars}**`,
      locked:false
    });
  }

  saveRewards(custom);
  clearRewardForm();
  renderRewards();
}

function editReward(id){
  const r = getCustomRewards().find(x => x.id === id);
  if(!r) return;

  editingRewardId = id;
  document.getElementById("rewardName").value = r.name;
  document.getElementById("rewardStars").value = r.stars;
}

function deleteReward(id){
  if(!confirm("Delete this reward?")) return;
  const custom = getCustomRewards().filter(r => r.id !== id);
  saveRewards(custom);
  clearRewardForm();
  renderRewards();
}

function clearRewardForm(){
  editingRewardId = null;
  document.getElementById("rewardName").value = "";
  document.getElementById("rewardStars").value = "";
}

function logReward(id){
  const reward = loadRewards().find(r => r.id === id);
  if(!reward) return;

  const note = buildEntry(reward.text, "");
  sendToShortcuts(encodeURIComponent(note));
  goHome();
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}
</script>

</body>
</html>
